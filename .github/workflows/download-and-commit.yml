name: API Download and Print Response

on:
  push:
    branches:
      - main

jobs:
  download-and-print:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Download data from API and print response
        run: |
          print("hei vain")  # Print the response to the console

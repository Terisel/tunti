name: API Call Workflow

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      - hello-world-action  # Trigger on pushes to this branch

jobs:
  api-call:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Use the latest version of Python

      - name: Install requests library
        run: |
          python -m pip install requests

      - name: Create and Run API Call Script
        run: |
          echo "import requests" > api_call.py
          echo "response = requests.get('https://api.porssisahko.net/v1/latest-prices.json')" >> api_call.py
          echo "print(response.json())" >> api_call.py
          python api_call.py  # Run the script

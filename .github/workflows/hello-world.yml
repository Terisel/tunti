name: API Call Workflow

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    branches:
      - hello-world-action  # Trigger on pushes to this branch

jobs:
  api-call:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Use the latest version of Python

      - name: Install requests library
        run: |
          python -m pip install requests

      - name: Make API Call and Print Response
        run: |
          python -c "
import requests
response = requests.get('https://api.porssisahko.net/v1/latest-prices.json')
print(response.json())  # Print the JSON response
"
